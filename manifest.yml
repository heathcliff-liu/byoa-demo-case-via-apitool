applications:
  - name: byoa-coach-demo
    memory: 512M
    disk_quota: 1G
    buildpack: python_buildpack
    command: python -m src
    health-check-type: http
    health-check-http-endpoint: /.well-known/agent.json
    timeout: 120
    env:
      ZHIPU_API_KEY: YOUR_ZHIPU_API_KEY
      USE_MOCK_DATA: "true"
      LOG_LEVEL: INFO
